name: Publish Main

on:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: publish-main
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish flattened addon branch
        run: ./scripts/publish_main_branch.sh
